<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprint Tactics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="kicker">Пошаговая стратегия/тактика</p>
        <h1>Sprint Tactics: Битва за релиз</h1>
      </div>
      <div class="turn-box">
        <span id="turnLabel">Ход 1</span>
        <strong id="teamLabel">Команда разработки</strong>
      </div>
    </header>

    <main class="layout">
      <section class="board-section">
        <div id="board" class="board" aria-label="Игровое поле"></div>
        <div class="controls">
          <button id="endTurnBtn" type="button">Завершить ход</button>
          <button id="restartBtn" type="button" class="secondary">Начать заново</button>
        </div>
      </section>

      <aside class="panel">
        <div class="card">
          <h2>Цель миссии</h2>
          <p>Доведите проект до релиза: уничтожьте все угрозы (баги и дедлайн), пока ваша команда жива.</p>
        </div>

        <div class="card" id="selectedCard">
          <h2>Выбранный юнит</h2>
          <p id="selectedInfo">Выберите героя команды разработки.</p>
        </div>

        <div class="card">
          <h2>Состав команд</h2>
          <div class="team-columns">
            <div>
              <h3>Разработка</h3>
              <ul id="devList" class="unit-list"></ul>
            </div>
            <div>
              <h3>Угрозы</h3>
              <ul id="bugList" class="unit-list"></ul>
            </div>
          </div>
        </div>

        <div class="card log-card">
          <h2>Лог боя</h2>
          <ul id="battleLog" class="log"></ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
